[build]
  functions = "netlify/functions"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[functions."generate-open-market-report"]
  # Run at both UTC candidates; function guards local Pacific hour for DST safety.
  schedule = "5 19,20 * * *"

[functions."generate-midday-report"]
  # Run at both UTC candidates; function guards local Pacific hour for DST safety.
  schedule = "5 22,23 * * *"

[functions."generate-endofday-report"]
  # Run at both UTC candidates; function guards local Pacific hour for DST safety.
  schedule = "5 2,3 * * *"
